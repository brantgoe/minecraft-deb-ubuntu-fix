<svg xmlns="http://www.w3.org/2000/svg" width="820" height="504" viewBox="0 0 820 504" role="img" aria-label="Terminal showing a successful Minecraft launcher install">
  <style>
    .t { font-family: 'DejaVu Sans Mono','Cascadia Code',ui-monospace,Menlo,Consolas,monospace; font-size: 15px; }
    .head  { fill: #56d4dd; }
    .ok    { fill: #3fb950; }
    .txt   { fill: #c9d1d9; }
    .dim   { fill: #8b949e; }
    .done  { fill: #ffffff; font-weight: 700; }
  </style>

  <!-- window -->
  <rect x="0" y="0" width="820" height="504" rx="10" fill="#0d1117"/>
  <rect x="0" y="0" width="820" height="38" rx="10" fill="#161b22"/>
  <rect x="0" y="28" width="820" height="10" fill="#161b22"/>
  <circle cx="24" cy="19" r="6" fill="#ff5f56"/>
  <circle cx="44" cy="19" r="6" fill="#ffbd2e"/>
  <circle cx="64" cy="19" r="6" fill="#27c93f"/>
  <text x="410" y="23" text-anchor="middle" class="t dim" font-size="12">Terminal — ./install-minecraft.sh</text>

  <!-- output -->
  <text x="24" y="72"  class="t head">=== 1/4  Java runtime (default-jre) ===</text>
  <text x="24" y="96"  class="t ok">OK  Java already present: openjdk version "25.0.3"</text>

  <text x="24" y="144" class="t head">=== 2/4  Checking dependencies ===</text>
  <text x="24" y="168" class="t ok">OK  will rewrite  libgdk-pixbuf2.0-0  -&gt;  libgdk-pixbuf-2.0-0</text>

  <text x="24" y="216" class="t head">=== 3/4  Repacking .deb with corrected dependency names ===</text>
  <text x="24" y="240" class="t ok">OK  built patched package</text>

  <text x="24" y="288" class="t head">=== 4/4  Installing launcher ===</text>
  <text x="24" y="312" class="t dim">Setting up minecraft-launcher (2.1.3) ...</text>

  <text x="24" y="360" class="t head">=== Verify ===</text>
  <text x="24" y="384" class="t ok">OK  minecraft-launcher: /usr/bin/minecraft-launcher</text>
  <text x="24" y="408" class="t ok">OK  Java: openjdk version "25.0.3"</text>

  <text x="24" y="456" class="t done">Done. Launch it from your app menu or run:  minecraft-launcher</text>
  <text x="24" y="480" class="t ok">$ <tspan class="txt">▮</tspan></text>
</svg>
